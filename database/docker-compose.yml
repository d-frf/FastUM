version: "3.1"

services: 
  mysql:
    container_name: FastUM
    image: mysql
    ports:
      - "3306:3306"
    restart: unless-stopped 
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: fastum
      MYSQL_USER: Nestor
      MYSQL_PASSWORD: Java2526
    volumes:
      - ./database:/var/lib/mysql
      - ./init:/docker-entrypoint-initdb.d
      - ./scripts:/scripts

